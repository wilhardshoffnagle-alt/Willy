<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 1rem;
      color: #a78bfa;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #a0a0c0;
      display: block;
      margin-bottom: 5px;
    }

    textarea {
      width: 100%;
      height: 110px;
      background: #0f0f1a;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #e0e0e0;
      resize: none;
      outline: none;
      margin-bottom: 14px;
    }

    textarea:focus { border-color: #a78bfa; }

    .sliders {
      background: #0f0f1a;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      margin: 0;
      min-width: 100px;
      font-size: 0.72rem;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #a78bfa;
      cursor: pointer;
    }

    .val {
      font-size: 0.8rem;
      color: #a78bfa;
      font-family: 'Courier New', monospace;
      min-width: 20px;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      background: #a78bfa;
      color: #0f0f1a;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #status {
      font-size: 0.78rem;
      color: #f87171;
      margin-top: 8px;
      min-height: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Realistic Typing Simulator</h1>
  <p class="sub">Paste text → it types itself into your Google Doc.</p>

  <label for="inputText">Text to type</label>
  <textarea id="inputText" placeholder="Paste your text here…"></textarea>

  <div class="sliders">
    <div class="row">
      <label for="speed">Typing speed</label>
      <input type="range" id="speed" min="1" max="10" value="5" />
      <span class="val" id="speedVal">5</span>
    </div>
    <div class="row">
      <label for="mistakes">Mistake rate</label>
      <input type="range" id="mistakes" min="0" max="10" value="3" />
      <span class="val" id="mistakeVal">3</span>
    </div>
  </div>

  <button id="startBtn">Start Typing</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
