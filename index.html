<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Tone Color Coder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f5f5f5; padding: 20px; min-height: 100vh; }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 10px; }
    .legend { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; font-size: 0.9rem; font-weight: 600; }
    .t1 { color: #2196F3; }
    .t2 { color: #4CAF50; }
    .t3 { color: #9C27B0; }
    .t4 { color: #F44336; }
    .t0 { color: #888888; }
    .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    textarea { width: 100%; height: 100px; font-size: 1.1rem; padding: 10px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; font-family: inherit; }
    textarea:focus { outline: none; border-color: #2196F3; }
    button { margin-top: 10px; padding: 12px 32px; font-size: 1rem; background: #2196F3; color: #fff; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background: #1976D2; }
    #status { font-size: 0.85rem; color: #888; margin-top: 6px; min-height: 18px; }
    #output { font-size: 1.3rem; line-height: 3; min-height: 60px; }
    .char-group { display: inline-block; text-align: center; margin: 0 2px; vertical-align: bottom; }
    .pinyin { display: block; font-size: 0.65rem; font-family: Arial, sans-serif; line-height: 1.3; }
    .hanzi { display: block; font-size: 1.4rem; line-height: 1.2; }
    .other { color: #333; font-size: 1.1rem; vertical-align: bottom; display: inline-block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chinese Tone Color Coder</h1>
    <div class="legend">
      <span class="t1">&#9632; Tone 1 (ā)</span>
      <span class="t2">&#9632; Tone 2 (á)</span>
      <span class="t3">&#9632; Tone 3 (ǎ)</span>
      <span class="t4">&#9632; Tone 4 (à)</span>
      <span class="t0">&#9632; Neutral</span>
    </div>
    <textarea id="input" placeholder="Paste Chinese characters here…"></textarea>
    <button onclick="convert()">Color Code</button>
    <div id="status">Loading pinyin library…</div>
  </div>
  <div class="card">
    <div id="output"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
  <script>
    const status = document.getElementById('status');

    function ready() {
      return typeof pinyinPro !== 'undefined' && typeof pinyinPro.pinyin === 'function';
    }

    function waitReady(cb, tries) {
      if (ready()) { status.textContent = 'Ready'; cb(); return; }
      if (tries <= 0) { status.textContent = 'Failed to load library. Check internet connection.'; return; }
      setTimeout(() => waitReady(cb, tries - 1), 300);
    }

    waitReady(() => {}, 30);

    const diacritics = {
      'ā':1,'á':2,'ǎ':3,'à':4,
      'ē':1,'é':2,'ě':3,'è':4,
      'ī':1,'í':2,'ǐ':3,'ì':4,
      'ō':1,'ó':2,'ǒ':3,'ò':4,
      'ū':1,'ú':2,'ǔ':3,'ù':4,
      'ǖ':1,'ǘ':2,'ǚ':3,'ǜ':4,
    };

    function getTone(py) {
      for (const ch of py) if (diacritics[ch]) return diacritics[ch];
      return 0;
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function convert() {
      if (!ready()) { status.textContent = 'Still loading, please wait…'; return; }
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      if (!input.trim()) { output.innerHTML = ''; return; }

      const chars = Array.from(input);
      const pyList = pinyinPro.pinyin(input, { toneType: 'symbol', type: 'array', nonZh: 'consecutive' });

      let html = '', pi = 0;
      for (const ch of chars) {
        const code = ch.codePointAt(0);
        const isCJK = (code >= 0x4E00 && code <= 0x9FFF) ||
                      (code >= 0x3400 && code <= 0x4DBF) ||
                      (code >= 0xF900 && code <= 0xFAFF) ||
                      (code >= 0x20000 && code <= 0x2A6DF);
        if (isCJK) {
          const py = pyList[pi++] || '';
          const t = getTone(py);
          const cls = t ? 't' + t : 't0';
          html += `<span class="char-group ${cls}"><span class="pinyin">${esc(py)}</span><span class="hanzi">${esc(ch)}</span></span>`;
        } else if (ch === '\n') {
          html += '<br>'; pi++;
        } else {
          html += `<span class="other">${ch === ' ' ? '&nbsp;' : esc(ch)}</span>`; pi++;
        }
      }
      output.innerHTML = html;
      status.textContent = '';
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) convert();
    });
  </script>
</body>
</html>
