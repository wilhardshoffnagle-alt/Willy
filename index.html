<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Tone Color Coder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 6px;
    }
    .legend {
      display: flex;
      gap: 18px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      font-size: 0.92rem;
    }
    .legend span { font-weight: 600; }
    .t1 { color: #2196F3; }   /* Tone 1 - Blue   */
    .t2 { color: #4CAF50; }   /* Tone 2 - Green  */
    .t3 { color: #9C27B0; }   /* Tone 3 - Purple */
    .t4 { color: #F44336; }   /* Tone 4 - Red    */
    .t0 { color: #888888; }   /* Neutral - Gray  */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 100px;
      font-size: 1.2rem;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #2196F3; }
    .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
    button {
      padding: 10px 28px;
      font-size: 1rem;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1976D2; }
    button:disabled { background: #aaa; cursor: default; }
    #status { font-size: 0.9rem; color: #888; }
    #output {
      font-size: 1.4rem;
      line-height: 2.8;
      min-height: 60px;
    }
    .char-group {
      display: inline-block;
      text-align: center;
      margin: 0 2px;
      vertical-align: bottom;
    }
    .pinyin {
      display: block;
      font-size: 0.65rem;
      font-family: Arial, sans-serif;
      line-height: 1.3;
      letter-spacing: 0;
    }
    .hanzi {
      display: block;
      font-size: 1.5rem;
      line-height: 1.2;
    }
    .other {
      color: #333;
      font-size: 1.3rem;
      vertical-align: bottom;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chinese Tone Color Coder</h1>
    <div class="legend">
      <span class="t1">в–  Tone 1 (ДҒ) вҖ“ Blue</span>
      <span class="t2">в–  Tone 2 (ГЎ) вҖ“ Green</span>
      <span class="t3">в–  Tone 3 (ЗҺ) вҖ“ Purple</span>
      <span class="t4">в–  Tone 4 (Г ) вҖ“ Red</span>
      <span class="t0">в–  Neutral вҖ“ Gray</span>
    </div>
    <textarea id="input" placeholder="Paste Chinese characters here, e.g. дёӯеӣҪ зҺ°еңЁ дҪ еҘҪ"></textarea>
    <div class="btn-row">
      <button id="btn" onclick="convert()">Color Code</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="card">
    <div id="output"></div>
  </div>

  <!-- pinyin-pro: context-aware pinyin library, no data file needed -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
  <script>
    const toneClass = { 1: 't1', 2: 't2', 3: 't3', 4: 't4', 0: 't0' };

    function getToneNum(pinyinStr) {
      // pinyin-pro returns diacritic pinyin like "zhЕҚng", "guГі", "de"
      const toneChars = {
        'ДҒ':1,'ГЎ':2,'ЗҺ':3,'Г ':4,
        'Д“':1,'Г©':2,'Дӣ':3,'ГЁ':4,
        'Д«':1,'Гӯ':2,'Зҗ':3,'Г¬':4,
        'ЕҚ':1,'Гі':2,'З’':3,'ГІ':4,
        'Е«':1,'Гә':2,'З”':3,'Г№':4,
        'З–':1,'Зҳ':2,'Зҡ':3,'Зң':4,
      };
      for (const ch of pinyinStr) {
        if (toneChars[ch]) return toneChars[ch];
      }
      return 0; // neutral
    }

    function convert() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      const status = document.getElementById('status');

      if (!input.trim()) { output.innerHTML = ''; return; }

      if (typeof pinyinPro === 'undefined') {
        status.textContent = 'Library still loading, please try againвҖҰ';
        return;
      }

      status.textContent = '';

      // Get per-character pinyin from pinyin-pro
      const chars = Array.from(input);
      let pinyinList;
      try {
        // pinyin() with type:'array' returns one entry per character
        pinyinList = pinyinPro.pinyin(input, { toneType: 'symbol', type: 'array', nonZh: 'consecutive' });
      } catch(e) {
        status.textContent = 'Error: ' + e.message;
        return;
      }

      let html = '';
      let pIdx = 0;

      for (const char of chars) {
        const code = char.codePointAt(0);
        const isCJK = (code >= 0x4E00 && code <= 0x9FFF) ||
                      (code >= 0x3400 && code <= 0x4DBF) ||
                      (code >= 0xF900 && code <= 0xFAFF) ||
                      (code >= 0x20000 && code <= 0x2A6DF);

        if (isCJK) {
          const py = pinyinList[pIdx] || '';
          const tone = getToneNum(py);
          const cls = toneClass[tone] || 't0';
          html += `<span class="char-group ${cls}"><span class="pinyin">${py}</span><span class="hanzi">${char}</span></span>`;
          pIdx++;
        } else if (char === '\n') {
          html += '<br style="line-height:1">';
          if (pinyinList[pIdx] === '\n' || pinyinList[pIdx] === '') pIdx++;
        } else if (char === ' ') {
          html += '<span class="other">&thinsp;&thinsp;</span>';
          if (pinyinList[pIdx] === ' ' || pinyinList[pIdx] === '') pIdx++;
        } else {
          html += `<span class="other">${char.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`;
          pIdx++;
        }
      }

      output.innerHTML = html;
    }

    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) convert();
    });
  </script>
</body>
</html>
