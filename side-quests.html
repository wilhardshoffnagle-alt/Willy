<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Quest Generator ⚔️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0b1a;
      --surface: rgba(255,255,255,0.045);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.09);
      --border-hover: rgba(255,255,255,0.18);
      --gold: #f6c90e;
      --gold-dim: rgba(246,201,14,0.15);
      --purple: #7c3aed;
      --purple-glow: rgba(124,58,237,0.35);
      --purple-light: #a78bfa;
      --text: #eeeeff;
      --text-muted: rgba(238,238,255,0.45);
      --card-shadow: 0 12px 40px rgba(0,0,0,0.5);
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 50% at 10% 10%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(79,70,229,0.12) 0%, transparent 60%);
    }

    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 52px 20px 100px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 44px;
    }
    .badge {
      display: inline-block;
      background: var(--gold-dim);
      border: 1px solid rgba(246,201,14,0.28);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.1rem, 6vw, 3.1rem);
      font-weight: 800;
      line-height: 1.12;
      background: linear-gradient(135deg, #fff 25%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .header p {
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 300;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--card-shadow);
      transition: opacity 0.3s, filter 0.3s;
    }
    .card.dimmed {
      opacity: 0.45;
      pointer-events: none;
      filter: blur(1px);
    }

    /* ── Field ── */
    .field { margin-bottom: 26px; }
    .field:last-of-type { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── Time buttons ── */
    .time-btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .time-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 12px;
      padding: 13px 6px 11px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .time-btn .icon { font-size: 1.5rem; line-height: 1; }
    .time-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      color: var(--text);
    }
    .time-btn.active {
      background: rgba(124,58,237,0.18);
      border-color: var(--purple-light);
      color: var(--text);
      box-shadow: 0 0 14px var(--purple-glow);
    }

    /* ── Inputs ── */
    input[type="text"], textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 13px 16px;
      transition: border-color 0.18s, box-shadow 0.18s;
      resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
    }
    ::placeholder { color: var(--text-muted); }
    textarea { height: 88px; }

    /* ── Generate Button ── */
    .generate-btn {
      width: 100%;
      margin-top: 28px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1.08rem;
      font-weight: 700;
      padding: 17px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .generate-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .generate-btn:hover:not(:disabled)::after { opacity: 1; }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(124,58,237,0.45);
    }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading ── */
    .loading {
      display: none;
      text-align: center;
      padding: 56px 20px;
    }
    .loading.visible { display: block; }
    .spinner {
      display: inline-block;
      font-size: 2.8rem;
      animation: float 2.4s ease-in-out infinite;
      margin-bottom: 16px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-10px) rotate(5deg); }
    }
    .loading p {
      color: var(--text-muted);
      font-size: 1rem;
    }
    .dots::after {
      content: '';
      animation: dots 1.6s steps(4, end) infinite;
    }
    @keyframes dots {
      0%,20%   { content: ''; }
      40%      { content: '.'; }
      60%      { content: '..'; }
      80%,100% { content: '...'; }
    }

    /* ── Error ── */
    .error-card {
      display: none;
      margin-top: 18px;
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.22);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .error-card.visible { display: block; }

    /* ── Results ── */
    .results {
      display: none;
      margin-top: 32px;
    }
    .results.visible { display: block; }

    .results-header {
      text-align: center;
      margin-bottom: 22px;
    }
    .results-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
    }
    .results-header p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 4px;
    }

    /* ── Quest Cards ── */
    .quest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      margin-bottom: 14px;
      opacity: 0;
      animation: slideUp 0.42s ease forwards;
    }
    .quest-card:nth-child(2) { animation-delay: 0.1s; }
    .quest-card:nth-child(3) { animation-delay: 0.2s; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quest-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3px;
    }
    .quest-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .type-badge {
      display: inline-block;
      background: rgba(124,58,237,0.14);
      border: 1px solid rgba(167,139,250,0.28);
      color: var(--purple-light);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 3px 11px;
      border-radius: 100px;
      margin-bottom: 16px;
    }
    .quest-field {
      margin-bottom: 13px;
      font-size: 0.92rem;
      line-height: 1.65;
    }
    .quest-field:last-child { margin-bottom: 0; }
    .field-lbl {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .reward-box {
      background: rgba(246,201,14,0.05);
      border: 1px solid rgba(246,201,14,0.14);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 14px;
    }
    .reward-box .field-lbl { color: var(--gold); }
    .reward-box p { color: rgba(238,238,255,0.82); font-size: 0.92rem; line-height: 1.65; }

    /* ── Reset button ── */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }
    .reset-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    /* ── Fallback text display ── */
    .raw-output {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    @media (max-width: 480px) {
      .container { padding: 36px 16px 80px; }
      .card { padding: 22px; }
      .time-btns { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="badge">✦ Adventure Awaits</div>
    <h1>Side Quest Generator</h1>
    <p>Not sure what to do? We'll find your next adventure.</p>
  </header>

  <!-- Form -->
  <div class="card" id="formCard">

    <div class="field">
      <label>Time of Day</label>
      <div class="time-btns">
        <button class="time-btn" data-value="Morning" onclick="selectTime(this)">
          <span class="icon">☀️</span>Morning
        </button>
        <button class="time-btn" data-value="Afternoon" onclick="selectTime(this)">
          <span class="icon">🌤️</span>Afternoon
        </button>
        <button class="time-btn" data-value="Evening" onclick="selectTime(this)">
          <span class="icon">🌆</span>Evening
        </button>
        <button class="time-btn" data-value="Night" onclick="selectTime(this)">
          <span class="icon">🌙</span>Night
        </button>
      </div>
    </div>

    <div class="field">
      <label>Why do you want to go out?</label>
      <textarea id="reason" placeholder="e.g. We're super bored and need to do something fun, celebrating a birthday, need to get out of the house…"></textarea>
    </div>

    <div class="field">
      <label>Your General Area</label>
      <input type="text" id="location" placeholder="e.g. Downtown Austin TX, Brooklyn NY, Chicago suburbs…">
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateQuests()">
      🎲 Find My Side Quests
    </button>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner">🗺️</div>
    <p>Summoning your quests<span class="dots"></span></p>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>⚔️ Your Side Quests</h2>
      <p>Pick one and go. No more excuses.</p>
    </div>
    <div id="questCards"></div>
    <button class="reset-btn" onclick="resetForm()">↩ Generate New Quests</button>
  </div>

</div>

<script>
  let selectedTime = '';

  function selectTime(btn) {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTime = btn.dataset.value;
  }

  async function generateQuests() {
    const reason   = document.getElementById('reason').value.trim();
    const location = document.getElementById('location').value.trim();

    if (!selectedTime) { showValidationError('Please select a time of day!'); return; }
    if (!reason)        { showValidationError('Please tell us why you want to go out!'); return; }
    if (!location)      { showValidationError('Please enter your area!'); return; }

    setLoading(true);

    let fullText = '';
    try {
      const response = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timeOfDay: selectedTime, reason, location }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: 'Server error' }));
        throw new Error(err.error || `HTTP ${response.status}`);
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep partial line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const parsed = JSON.parse(raw);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.text)  fullText += parsed.text;
          } catch (e) {
            if (e.message && e.message !== 'Unexpected end of JSON input') throw e;
          }
        }
      }

      setLoading(false);
      renderQuests(fullText);

    } catch (err) {
      setLoading(false);
      showError('❌ ' + err.message + '\n\nMake sure the server is running and ANTHROPIC_API_KEY is set.');
    }
  }

  // ── Rendering ──────────────────────────────────────────────

  function renderQuests(text) {
    const container = document.getElementById('questCards');
    container.innerHTML = '';

    // Split on quest headers
    const blocks = text.split(/(?=##\s)/g).filter(b => b.trim().startsWith('##'));

    if (blocks.length === 0) {
      // Fallback: show raw text in a card
      container.innerHTML =
        `<div class="quest-card" style="opacity:1"><pre class="raw-output">${escHtml(text)}</pre></div>`;
    } else {
      blocks.forEach((block, i) => container.appendChild(buildQuestCard(block, i + 1)));
    }

    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildQuestCard(text, n) {
    const card = document.createElement('div');
    card.className = 'quest-card';

    // Title from ## header
    const titleM  = text.match(/##\s+.*?Quest\s+\d+:\s+(.+)/i);
    const title    = titleM ? titleM[1].trim() : `Quest ${n}`;

    // Fields
    const typeM    = text.match(/\*\*Type:\*\*\s*(.+)/);
    const missionM = text.match(/\*\*The Mission:\*\*\s*([\s\S]+?)(?=\n\*\*|\n---|$)/);
    const whereM   = text.match(/\*\*Where to Go:\*\*\s*([\s\S]+?)(?=\n\*\*|\n---|$)/);
    const rewardM  = text.match(/\*\*Quest Reward:\*\*\s*([\s\S]+?)(?=\n\*\*|\n---|$)/);

    const type    = typeM    ? typeM[1].trim()    : '';
    const mission = missionM ? missionM[1].trim() : '';
    const where   = whereM   ? whereM[1].trim()   : '';
    const reward  = rewardM  ? rewardM[1].trim()  : '';

    card.innerHTML = `
      <div class="quest-num">Quest ${n}</div>
      <div class="quest-title">${escHtml(title)}</div>
      ${type    ? `<div class="type-badge">${escHtml(type)}</div>` : ''}
      ${mission ? `<div class="quest-field"><span class="field-lbl">The Mission</span>${escHtml(mission)}</div>` : ''}
      ${where   ? `<div class="quest-field"><span class="field-lbl">Where to Go</span>${escHtml(where)}</div>` : ''}
      ${reward  ? `<div class="reward-box"><span class="field-lbl">Quest Reward</span><p>${escHtml(reward)}</p></div>` : ''}
    `;
    return card;
  }

  // ── Helpers ────────────────────────────────────────────────

  function setLoading(on) {
    document.getElementById('generateBtn').disabled = on;
    document.getElementById('formCard').classList.toggle('dimmed', on);
    document.getElementById('loading').classList.toggle('visible', on);
    document.getElementById('results').classList.remove('visible');
    document.getElementById('errorCard').classList.remove('visible');
  }

  function showError(msg) {
    const el = document.getElementById('errorCard');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('formCard').classList.remove('dimmed');
    document.getElementById('generateBtn').disabled = false;
  }

  function showValidationError(msg) {
    showError(msg);
    document.getElementById('formCard').classList.remove('dimmed');
  }

  function resetForm() {
    document.getElementById('results').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(str) {
    return str
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
