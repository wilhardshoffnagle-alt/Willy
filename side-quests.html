<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What should we do?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1712;
      --paper: #fff8ee;
      --paper-2: #fdecd0;
      --accent: #ff5436;
      --accent-soft: #ffe4dc;
      --muted: #8a7f70;
      --line: #e6d8be;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: var(--paper); color: var(--ink); }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 85% -10%, var(--paper-2) 0%, transparent 55%),
        radial-gradient(circle at -10% 100%, #ffd9c9 0%, transparent 45%),
        var(--paper);
      padding: 40px 20px 80px;
      line-height: 1.5;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* Hero */
    .hero { margin-bottom: 40px; }
    .eyebrow {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }
    .hero h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
    }

    /* Steps */
    .steps { display: flex; flex-direction: column; gap: 26px; }

    .step {
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 20px;
      padding: 22px 22px 24px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .step:focus-within {
      border-color: var(--ink);
      box-shadow: 0 6px 24px rgba(26,23,18,0.08);
    }

    .step-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .step-num {
      flex: 0 0 auto;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 0.95rem;
      display: grid;
      place-items: center;
    }
    .step-label {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.18rem;
    }

    /* Chip picker */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: transparent;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      padding: 9px 16px;
      font: inherit;
      font-size: 0.92rem;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--ink); }
    .chip.on {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    /* Text inputs */
    .field {
      width: 100%;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 1rem;
      color: var(--ink);
      padding: 8px 2px;
      border-bottom: 1.5px solid var(--line);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }
    .field:focus { border-color: var(--ink); }
    .field::placeholder { color: var(--muted); }
    textarea.field { min-height: 60px; line-height: 1.5; }

    /* CTA */
    .cta {
      margin-top: 28px;
      width: 100%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 999px;
      padding: 18px;
      font: inherit;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }
    .cta:hover:not(:disabled) { background: var(--accent); }
    .cta:active:not(:disabled) { transform: scale(0.99); }
    .cta:disabled { opacity: 0.4; cursor: wait; }

    /* Status line */
    .status {
      margin-top: 14px;
      min-height: 1.4em;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }
    .status.err { color: var(--accent); }

    /* Results */
    .results { margin-top: 44px; display: none; }
    .results.on { display: block; }

    .results-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .results-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 22px;
    }

    .idea {
      border-top: 1.5px solid var(--line);
      padding: 24px 0;
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.5s ease forwards;
    }
    .idea:nth-child(2) { animation-delay: 0.08s; }
    .idea:nth-child(3) { animation-delay: 0.16s; }
    .idea:nth-child(4) { animation-delay: 0.24s; }
    .idea:last-child { border-bottom: 1.5px solid var(--line); }
    @keyframes rise { to { opacity: 1; transform: none; } }

    .idea-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .idea-num {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--accent);
    }
    .idea-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.35rem;
      line-height: 1.2;
      flex: 1;
    }
    .idea-tag {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .idea-body { margin-bottom: 12px; }
    .idea-where {
      background: var(--paper-2);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.94rem;
    }
    .idea-where b {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .again {
      margin-top: 28px;
      width: 100%;
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      padding: 14px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .again:hover { background: var(--ink); color: var(--paper); }

    /* Raw fallback */
    .raw {
      white-space: pre-wrap;
      font-size: 0.94rem;
      color: var(--ink);
      padding: 18px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header class="hero">
      <div class="eyebrow">tell me three things</div>
      <h1>So… <em>what should we do?</em></h1>
      <p>Three questions. One AI. A shortlist of things to do near you, right now.</p>
    </header>

    <form class="steps" id="form" onsubmit="go(event)">

      <section class="step">
        <div class="step-head">
          <span class="step-num">1</span>
          <span class="step-label">When are we talking?</span>
        </div>
        <div class="chips" role="radiogroup" id="timeChips">
          <button type="button" class="chip" data-v="Morning">Morning</button>
          <button type="button" class="chip" data-v="Afternoon">Afternoon</button>
          <button type="button" class="chip" data-v="Evening">Evening</button>
          <button type="button" class="chip" data-v="Late night">Late night</button>
        </div>
      </section>

      <section class="step">
        <div class="step-head">
          <span class="step-num">2</span>
          <span class="step-label">Why are you looking?</span>
        </div>
        <textarea class="field" id="why" placeholder="Bored? Date? Visiting friends? Just need out of the house?"></textarea>
      </section>

      <section class="step">
        <div class="step-head">
          <span class="step-num">3</span>
          <span class="step-label">Where are you?</span>
        </div>
        <input class="field" id="where" placeholder="Neighborhood, city, or zip — the more specific the better">
      </section>

      <button class="cta" id="cta" type="submit">Find us something →</button>
      <div class="status" id="status"></div>
    </form>

    <section class="results" id="results">
      <h2 class="results-title">Here's what I'd try</h2>
      <p class="results-sub" id="resultsSub"></p>
      <div id="ideas"></div>
      <button class="again" type="button" onclick="reset()">Start over</button>
    </section>

  </div>

<script>
  let time = '';

  document.querySelectorAll('#timeChips .chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('#timeChips .chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      time = c.dataset.v;
    });
  });

  async function go(e) {
    e.preventDefault();
    const why   = document.getElementById('why').value.trim();
    const where = document.getElementById('where').value.trim();

    if (!time)  return setStatus('Pick a time of day.', true);
    if (!why)   return setStatus('A quick "why" helps a lot.', true);
    if (!where) return setStatus('Where are you roughly?', true);

    setBusy(true);
    setStatus('Thinking…');

    let buf = '';
    try {
      const r = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timeOfDay: time, reason: why, location: where }),
      });

      if (!r.ok) {
        const j = await r.json().catch(() => ({ error: 'Server error' }));
        throw new Error(j.error || `HTTP ${r.status}`);
      }

      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let carry = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        carry += dec.decode(value, { stream: true });
        const lines = carry.split('\n');
        carry = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const p = JSON.parse(raw);
            if (p.error) throw new Error(p.error);
            if (p.text) buf += p.text;
          } catch (err) {
            if (err.message && err.message !== 'Unexpected end of JSON input') throw err;
          }
        }
      }

      setBusy(false);
      setStatus('');
      render(buf, { time, why, where });
    } catch (err) {
      setBusy(false);
      setStatus(err.message + ' — check the server and ANTHROPIC_API_KEY.', true);
    }
  }

  function render(text, ctx) {
    const ideas = document.getElementById('ideas');
    ideas.innerHTML = '';

    const parts = text.split(/(?=###\s*Idea\s*\d+)/i).filter(p => /###\s*Idea/i.test(p));

    if (!parts.length) {
      ideas.innerHTML = `<div class="raw">${esc(text)}</div>`;
    } else {
      parts.forEach((p, i) => ideas.appendChild(buildIdea(p, i + 1)));
    }

    document.getElementById('resultsSub').textContent =
      `For ${ctx.time.toLowerCase()} in ${ctx.where}.`;
    document.getElementById('results').classList.add('on');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildIdea(block, n) {
    const titleM = block.match(/###\s*Idea\s*\d+\s*[:\-–—]\s*(.+)/i);
    const vibeM  = block.match(/\*\*Vibe:\*\*\s*(.+)/i);
    const whatM  = block.match(/\*\*What:\*\*\s*([\s\S]+?)(?=\n\*\*|$)/i);
    const whereM = block.match(/\*\*Where to look:\*\*\s*([\s\S]+?)(?=\n\*\*|$)/i);

    const title = titleM ? titleM[1].trim() : `Idea ${n}`;
    const vibe  = vibeM  ? vibeM[1].trim()  : '';
    const what  = whatM  ? whatM[1].trim()  : block.replace(/###.*\n/, '').trim();
    const wherе = whereM ? whereM[1].trim() : '';

    const el = document.createElement('article');
    el.className = 'idea';
    el.innerHTML = `
      <div class="idea-head">
        <span class="idea-num">${n < 10 ? '0' + n : n}</span>
        <h3 class="idea-title">${esc(title)}</h3>
      </div>
      ${vibe ? `<span class="idea-tag">${esc(vibe)}</span>` : ''}
      <p class="idea-body">${esc(what)}</p>
      ${wherе ? `<div class="idea-where"><b>Where to look</b>${esc(wherе)}</div>` : ''}
    `;
    return el;
  }

  function setBusy(b) {
    document.getElementById('cta').disabled = b;
    document.getElementById('cta').textContent = b ? 'Thinking…' : 'Find us something →';
  }
  function setStatus(msg, err) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.classList.toggle('err', !!err);
  }
  function reset() {
    document.getElementById('results').classList.remove('on');
    document.getElementById('ideas').innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
