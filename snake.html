<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 4px;
      color: #4ecca3;
    }

    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    #score-board span {
      color: #a8dadc;
    }

    #score-board strong {
      color: #4ecca3;
    }

    canvas {
      border: 2px solid #4ecca3;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
      background: #0f3460;
    }

    #message {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #a8dadc;
      height: 20px;
    }

    #controls {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score-board">
    <div><span>SCORE </span><strong id="score">0</strong></div>
    <div><span>BEST </span><strong id="best">0</strong></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press any arrow key or WASD to start</div>
  <div id="controls">Arrow keys / WASD to move &nbsp;|&nbsp; P to pause</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const messageEl = document.getElementById('message');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const DIR = {
      UP:    { x: 0,  y: -1 },
      DOWN:  { x: 0,  y:  1 },
      LEFT:  { x: -1, y:  0 },
      RIGHT: { x: 1,  y:  0 },
    };

    let snake, dir, nextDir, food, score, best, gameLoop, state;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = DIR.RIGHT;
      nextDir = DIR.RIGHT;
      score = 0;
      state = 'waiting'; // waiting | running | paused | over
      scoreEl.textContent = 0;
      best = parseInt(localStorage.getItem('snakeBest') || '0');
      bestEl.textContent = best;
      placeFood();
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function start() {
      if (state === 'running') return;
      state = 'running';
      messageEl.textContent = '';
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, 130);
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      clearInterval(gameLoop);
      state = 'over';
      messageEl.textContent = 'Game over! Press R to restart';
      drawGameOver();
    }

    function draw() {
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid dots
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Draw food
      const fx = food.x * CELL;
      const fy = food.y * CELL;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx + CELL / 2, fy + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // Food shine
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(fx + CELL / 2 - 3, fy + CELL / 2 - 3, 3, 0, Math.PI * 2);
      ctx.fill();

      // Draw snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const r = Math.round(78 - t * 20);
        const g = Math.round(204 - t * 80);
        const b = Math.round(163 - t * 60);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * CELL + 1,
          seg.y * CELL + 1,
          CELL - 2,
          CELL - 2,
          i === 0 ? 6 : 3
        );
        ctx.fill();
      });

      // Draw eyes on head
      const head = snake[0];
      ctx.fillStyle = '#0f3460';
      const eyeOffset = getEyeOffsets();
      eyeOffset.forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(
          head.x * CELL + ex,
          head.y * CELL + ey,
          2.5, 0, Math.PI * 2
        );
        ctx.fill();
      });
    }

    function getEyeOffsets() {
      const c = CELL;
      if (dir === DIR.RIGHT) return [[c - 5, 5], [c - 5, c - 5]];
      if (dir === DIR.LEFT)  return [[5, 5], [5, c - 5]];
      if (dir === DIR.UP)    return [[5, 5], [c - 5, 5]];
      if (dir === DIR.DOWN)  return [[5, c - 5], [c - 5, c - 5]];
      return [[c - 5, 5], [c - 5, c - 5]];
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(15, 52, 96, 0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);

      ctx.fillStyle = '#4ecca3';
      ctx.font = '18px monospace';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
    }

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();

      if (key === 'r' && state === 'over') {
        init();
        return;
      }

      if (key === 'p') {
        if (state === 'running') {
          clearInterval(gameLoop);
          state = 'paused';
          messageEl.textContent = 'Paused — press P to resume';
        } else if (state === 'paused') {
          start();
        }
        return;
      }

      const map = {
        arrowup:    DIR.UP,
        arrowdown:  DIR.DOWN,
        arrowleft:  DIR.LEFT,
        arrowright: DIR.RIGHT,
        w: DIR.UP,
        s: DIR.DOWN,
        a: DIR.LEFT,
        d: DIR.RIGHT,
      };

      const newDir = map[key];
      if (!newDir) return;

      // Prevent reversing
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;

      nextDir = newDir;

      if (state === 'waiting') start();
    });

    init();
  </script>
</body>
</html>
